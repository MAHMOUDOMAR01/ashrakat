<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة ذاكرة الأطعمة - نسخة متطورة</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
    
    .back-button {
      display: inline-block;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      text-decoration: none;
      margin-bottom: 15px;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }
    
    .back-button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --secondary: #3b82f6;
      --warning: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 10s ease-in-out infinite;
    }
    
    @keyframes bgPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    .header {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.5s ease-out;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.3)); }
      50% { filter: drop-shadow(0 0 16px rgba(139, 92, 246, 0.6)); }
    }
    
    .stats-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .stat-box {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(236, 72, 153, 0.1));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px 20px;
      min-width: 100px;
      text-align: center;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .stat-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 3s infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    }
    
    .stat-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      position: relative;
      z-index: 1;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .control-btn {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(236, 72, 153, 0.1));
      border: 2px solid rgba(139, 92, 246, 0.4);
      border-radius: 16px;
      padding: 12px 24px;
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
      position: relative;
      overflow: hidden;
    }
    
    .control-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }
    
    .control-btn:hover::before {
      width: 300px;
      height: 300px;
    }
    
    .control-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
      border-color: var(--purple);
    }
    
    .control-btn.active {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border-color: var(--purple);
      transform: scale(1.05);
    }
    
    .timer-display {
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(239, 68, 68, 0.15));
      border: 2px solid rgba(245, 158, 11, 0.4);
      border-radius: 16px;
      padding: 16px 24px;
      text-align: center;
      margin-bottom: 24px;
      animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    .timer-value {
      font-size: 42px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--warning), var(--danger));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: timerPulse 1s ease-in-out infinite;
    }
    
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .timer-label {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    
    .timer-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 12px;
    }
    
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--warning), var(--danger));
      transition: width 1s linear;
      border-radius: 10px;
    }
    
    .game-grid {
      display: grid;
      gap: 12px;
      margin: 24px auto;
      max-width: 800px;
      perspective: 1000px;
    }
    
    .memory-card {
      aspect-ratio: 1;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      background: transparent;
    }
    
    .memory-card.flipped {
      transform: rotateY(180deg);
    }
    
    .memory-card.matched {
      animation: matchPulse 0.6s ease-out;
      pointer-events: none;
    }
    
    @keyframes matchPulse {
      0% { transform: scale(1) rotateY(180deg); }
      50% { transform: scale(1.15) rotateY(180deg); }
      100% { transform: scale(1) rotateY(180deg); }
    }
    
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      top: 0;
      left: 0;
    }
    
    .card-front {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), rgba(236, 72, 153, 0.2));
      border: 2px solid rgba(139, 92, 246, 0.5);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
      transform: rotateY(0deg);
    }
    
    .card-front:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5);
    }
    
    .card-back {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(59, 130, 246, 0.2));
      border: 2px solid rgba(16, 185, 129, 0.5);
      transform: rotateY(180deg);
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      animation: modalFadeIn 0.3s ease-out;
    }
    
    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalSlideUp 0.4s ease-out;
      text-align: center;
    }
    
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .modal-icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: iconBounce 1s ease-out;
    }
    
    @keyframes iconBounce {
      0%, 100% { transform: translateY(0); }
      25% { transform: translateY(-20px); }
      50% { transform: translateY(0); }
      75% { transform: translateY(-10px); }
    }
    
    .modal-title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }
    
    .modal-stat {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.05));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
    }
    
    .modal-stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    
    .modal-stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 16px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
      margin: 8px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(16, 185, 129, 0.5);
    }
    
    .btn-secondary {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 8px;
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .combo-badge {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, var(--warning), var(--danger));
      color: white;
      padding: 24px 48px;
      border-radius: 20px;
      font-size: 32px;
      font-weight: 800;
      box-shadow: 0 10px 40px rgba(245, 158, 11, 0.6);
      z-index: 999;
      pointer-events: none;
      opacity: 0;
    }
    
    .combo-badge.show {
      animation: comboPop 1s ease-out forwards;
    }
    
    @keyframes comboPop {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-10deg);
        opacity: 0;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.2) rotate(5deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(0) rotate(0);
        opacity: 0;
      }
    }
    
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      animation: particleFloat 2s ease-out forwards;
      z-index: 998;
    }
    
    @keyframes particleFloat {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-100px) scale(0);
        opacity: 0;
      }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }
      
      .header {
        padding: 16px;
      }
      
      .logo {
        font-size: 20px;
      }
      
      .stats-container {
        width: 100%;
        justify-content: center;
      }
      
      .game-grid {
        gap: 8px;
        padding: 0 10px;
      }
      
      .card-face {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
      }
      
      .modal-content {
        padding: 24px;
        width: 95%;
      }
      
      .timer-display {
        padding: 12px 16px;
      }
      
      .timer-value {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../games.html" class="back-button">العودة إلى قائمة الألعاب</a>
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <span>🧠</span>
          <span>لعبة ذاكرة الأطعمة</span>
        </div>
        <div class="stats-container">
          <div class="stat-box">
            <div class="stat-label">الحركات</div>
            <div class="stat-value" id="movesCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">الأزواج</div>
            <div class="stat-value" id="matchedCount">0/<span id="totalPairs">0</span></div>
          </div>
          <div class="stat-box">
            <div class="stat-label">النقاط</div>
            <div class="stat-value" id="scoreCount">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="btnEasy">🟢 سهل (3×4)</button>
      <button class="control-btn active" id="btnMedium">🟡 متوسط (4×4)</button>
      <button class="control-btn" id="btnHard">🔴 صعب (5×4)</button>
      <button class="control-btn" id="btnRestart">🔄 إعادة</button>
    </div>

    <div class="timer-display">
      <div class="timer-value" id="timerValue">0</div>
      <div class="timer-label">⏱️ الوقت المتبقي</div>
      <div class="timer-bar">
        <div class="timer-fill" id="timerFill" style="width: 100%"></div>
      </div>
    </div>

    <div class="game-grid" id="gameGrid"></div>
  </div>

  <div class="modal" id="gameModal">
    <div class="modal-content">
      <div class="modal-icon" id="modalIcon">🎉</div>
      <div class="modal-title" id="modalTitle">أحسنت!</div>
      <div id="modalMessage" style="color: var(--text-muted); margin-bottom: 20px;"></div>
      
      <div class="modal-stats" id="modalStats"></div>
      
      <div>
        <button class="btn-primary" onclick="restartGame()">🔄 لعب مرة أخرى</button>
        <button class="btn-secondary" onclick="closeModal()">✓ حسناً</button>
      </div>
    </div>
  </div>

  <div class="combo-badge" id="comboBadge"></div>

  <script>
    const FOODS = [
      {emoji: '🥗', name: 'سلطة'},
      {emoji: '🍎', name: 'تفاح'},
      {emoji: '🥕', name: 'جزر'},
      {emoji: '🥦', name: 'بروكلي'},
      {emoji: '🍊', name: 'برتقال'},
      {emoji: '🥬', name: 'خس'},
      {emoji: '🍇', name: 'عنب'},
      {emoji: '🥒', name: 'خيار'},
      {emoji: '🍓', name: 'فراولة'},
      {emoji: '🫘', name: 'فاصوليا'},
      {emoji: '🥜', name: 'لوز'},
      {emoji: '🐟', name: 'سمك'},
      {emoji: '🍠', name: 'بطاطا حلوة'},
      {emoji: '🥚', name: 'بيض'},
      {emoji: '🍞', name: 'خبز كامل'},
      {emoji: '🥑', name: 'أفوكادو'},
      {emoji: '🍌', name: 'موز'},
      {emoji: '🥛', name: 'حليب'},
      {emoji: '🧀', name: 'جبن'},
      {emoji: '🍗', name: 'دجاج'}
    ];

    const LEVELS = {
      easy: {rows: 3, cols: 4, time: 120, label: 'سهل'},
      medium: {rows: 4, cols: 4, time: 150, label: 'متوسط'},
      hard: {rows: 5, cols: 4, time: 180, label: 'صعب'}
    };

    let gameState = {
      level: 'medium',
      cards: [],
      flippedCards: [],
      matchedPairs: 0,
      moves: 0,
      score: 0,
      timeLeft: 0,
      timerInterval: null,
      isLocked: false,
      combo: 0,
      startTime: null
    };

    function initGame() {
      clearInterval(gameState.timerInterval);
      
      const level = LEVELS[gameState.level];
      const totalCards = level.rows * level.cols;
      const pairsNeeded = totalCards / 2;
      
      // Select random foods
      const selectedFoods = shuffleArray([...FOODS]).slice(0, pairsNeeded);
      
      // Create pairs and shuffle
      gameState.cards = shuffleArray([
        ...selectedFoods.map((food, idx) => ({...food, id: idx, pairId: idx})),
        ...selectedFoods.map((food, idx) => ({...food, id: idx + pairsNeeded, pairId: idx}))
      ]);
      
      gameState.flippedCards = [];
      gameState.matchedPairs = 0;
      gameState.moves = 0;
      gameState.score = 0;
      gameState.timeLeft = level.time;
      gameState.isLocked = false;
      gameState.combo = 0;
      gameState.startTime = Date.now();
      
      const totalPairsEl = document.getElementById('totalPairs');
      if (totalPairsEl) totalPairsEl.textContent = pairsNeeded;
      
      renderGrid();
      updateStats();
      startTimer();
    }

    function renderGrid() {
      const level = LEVELS[gameState.level];
      const grid = document.getElementById('gameGrid');
      
      grid.style.gridTemplateColumns = `repeat(${level.cols}, 1fr)`;
      grid.innerHTML = '';
      
      gameState.cards.forEach((card, index) => {
        const cardElement = document.createElement('button');
        cardElement.className = 'memory-card';
        cardElement.dataset.index = index;
        cardElement.innerHTML = `
          <div class="card-face card-front">❓</div>
          <div class="card-face card-back">${card.emoji}</div>
        `;
        cardElement.onclick = () => flipCard(index);
        grid.appendChild(cardElement);
      });
    }

    function flipCard(index) {
      if (gameState.isLocked) return;
      
      const cardElement = document.querySelector(`[data-index="${index}"]`);
      if (!cardElement || cardElement.classList.contains('flipped')) return;
      
      cardElement.classList.add('flipped');
      gameState.flippedCards.push({index, pairId: gameState.cards[index].pairId});
      
      if (gameState.flippedCards.length === 2) {
        gameState.isLocked = true;
        gameState.moves++;
        updateStats();
        
        setTimeout(checkMatch, 800);
      }
    }

    function checkMatch() {
      const [card1, card2] = gameState.flippedCards;
      const element1 = document.querySelector(`[data-index="${card1.index}"]`);
      const element2 = document.querySelector(`[data-index="${card2.index}"]`);
      
      if (card1.pairId === card2.pairId) {
        // Match found!
        element1.classList.add('matched');
        element2.classList.add('matched');
        
        gameState.matchedPairs++;
        gameState.combo++;
        
        // Calculate score
        const basePoints = 100;
        const timeBonus = Math.floor(gameState.timeLeft / 5);
        const comboBonus = gameState.combo > 1 ? (gameState.combo - 1) * 50 : 0;
        const levelMultiplier = gameState.level === 'easy' ? 1 : gameState.level === 'medium' ? 1.5 : 2;
        
        const points = Math.floor((basePoints + timeBonus + comboBonus) * levelMultiplier);
        gameState.score += points;
        
        createParticles(element1);
        createParticles(element2);
        
        if (gameState.combo > 1) {
          showCombo(gameState.combo);
        }
        
        // Check if game is won
        const totalPairs = gameState.cards.length / 2;
        if (gameState.matchedPairs === totalPairs) {
          setTimeout(() => gameWon(), 800);
        }
      } else {
        // No match
        gameState.combo = 0;
        
        setTimeout(() => {
          element1.classList.remove('flipped');
          element2.classList.remove('flipped');
        }, 400);
      }
      
      gameState.flippedCards = [];
      gameState.isLocked = false;
      updateStats();
    }

    function startTimer() {
      clearInterval(gameState.timerInterval);
      
      gameState.timerInterval = setInterval(() => {
        gameState.timeLeft--;
        
        const timerValue = document.getElementById('timerValue');
        const timerFill = document.getElementById('timerFill');
        
        if (timerValue) timerValue.textContent = gameState.timeLeft;
        if (timerFill) {
          const percent = (gameState.timeLeft / LEVELS[gameState.level].time) * 100;
          timerFill.style.width = percent + '%';
        }
        
        if (gameState.timeLeft <= 0) {
          clearInterval(gameState.timerInterval);
          gameOver();
        }
      }, 1000);
    }

    function updateStats() {
      const movesEl = document.getElementById('movesCount');
      const matchedEl = document.getElementById('matchedCount');
      const scoreEl = document.getElementById('scoreCount');
      const timerEl = document.getElementById('timerValue');
      
      if (movesEl) movesEl.textContent = gameState.moves;
      if (matchedEl) matchedEl.textContent = gameState.matchedPairs;
      if (scoreEl) scoreEl.textContent = gameState.score;
      if (timerEl) timerEl.textContent = gameState.timeLeft;
    }

    function createParticles(element) {
      const rect = element.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const emojis = ['✨', '⭐', '💫', '🌟'];
      
      for (let i = 0; i < 6; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        
        const angle = (Math.PI * 2 * i) / 6;
        const velocity = 50 + Math.random() * 50;
        particle.style.setProperty('--tx', Math.cos(angle) * velocity + 'px');
        particle.style.setProperty('--ty', Math.sin(angle) * velocity + 'px');
        
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 2000);
      }
    }

    function showCombo(combo) {
      const badge = document.getElementById('comboBadge');
      badge.textContent = `🔥 كومبو ×${combo}`;
      badge.classList.add('show');
      
      setTimeout(() => {
        badge.classList.remove('show');
      }, 1000);
    }

    function gameWon() {
      clearInterval(gameState.timerInterval);
      
      const level = LEVELS[gameState.level];
      const totalTime = level.time;
      const timeTaken = totalTime - gameState.timeLeft;
      const efficiency = Math.round((gameState.matchedPairs / gameState.moves) * 100);
      
      // Bonus for fast completion
      if (gameState.timeLeft > totalTime * 0.5) {
        gameState.score += 500;
      }
      
      // Perfect game bonus
      const perfectMoves = gameState.cards.length / 2;
      if (gameState.moves === perfectMoves) {
        gameState.score += 1000;
      }
      
      showModal(
        '🎉',
        'مبروك! أكملت اللعبة',
        `لقد أظهرت ذاكرة قوية وتركيز عالي!`,
        [
          {label: 'النقاط النهائية', value: gameState.score},
          {label: 'عدد الحركات', value: gameState.moves},
          {label: 'الوقت المستغرق', value: `${timeTaken}ث`},
          {label: 'الكفاءة', value: `${efficiency}%`},
          {label: 'أفضل كومبو', value: gameState.combo}
        ]
      );
    }

    function gameOver() {
      clearInterval(gameState.timerInterval);
      
      showModal(
        '⏰',
        'انتهى الوقت!',
        'حاول مرة أخرى لتحسين أدائك',
        [
          {label: 'الأزواج المكتملة', value: `${gameState.matchedPairs}/${gameState.cards.length / 2}`},
          {label: 'النقاط', value: gameState.score},
          {label: 'عدد الحركات', value: gameState.moves}
        ]
      );
    }

    function showModal(icon, title, message, stats) {
      const modal = document.getElementById('gameModal');
      const modalIcon = document.getElementById('modalIcon');
      const modalTitle = document.getElementById('modalTitle');
      const modalMessage = document.getElementById('modalMessage');
      const modalStats = document.getElementById('modalStats');
      
      modalIcon.textContent = icon;
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      
      modalStats.innerHTML = stats.map(stat => `
        <div class="modal-stat">
          <div class="modal-stat-value">${stat.value}</div>
          <div class="modal-stat-label">${stat.label}</div>
        </div>
      `).join('');
      
      modal.classList.add('show');
    }

    function closeModal() {
      document.getElementById('gameModal').classList.remove('show');
    }

    function setLevel(level) {
      gameState.level = level;
      
      // Update button states
      document.querySelectorAll('.control-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById('btn' + level.charAt(0).toUpperCase() + level.slice(1)).classList.add('active');
      
      restartGame();
    }

    function restartGame() {
      clearInterval(gameState.timerInterval);
      closeModal();
      initGame();
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Event listeners
    document.getElementById('btnEasy').onclick = () => setLevel('easy');
    document.getElementById('btnMedium').onclick = () => setLevel('medium');
    document.getElementById('btnHard').onclick = () => setLevel('hard');
    document.getElementById('btnRestart').onclick = restartGame;

    // Initialize game
    initGame();
  </script>
</body>
</html>
