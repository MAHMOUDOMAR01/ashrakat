<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لعبة الطبخ الصحي - نسخة متطورة</title>
  <style>
    

    .back-button {
      display: inline-block;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      text-decoration: none;
      margin-bottom: 15px;
    }
    
    .back-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }
    
    .back-button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --secondary: #8b5cf6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 40%, rgba(249, 115, 22, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgMove 15s ease-in-out infinite;
    }
    
    @keyframes bgMove {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    .header {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.5s ease-out;
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.3)); }
      50% { filter: drop-shadow(0 0 16px rgba(249, 115, 22, 0.6)); }
    }
    
    .stats-container {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .stat-box {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.15), rgba(139, 92, 246, 0.1));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px 20px;
      min-width: 100px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .stat-box:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(249, 115, 22, 0.3);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    .section-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      animation: fadeIn 0.5s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .section-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      animation: cardPulse 3s infinite;
    }
    
    @keyframes cardPulse {
      0% { transform: translateX(-100%) translateY(-100%) rotate(0deg); }
      100% { transform: translateX(100%) translateY(100%) rotate(360deg); }
    }
    
    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    
    .section-icon {
      font-size: 32px;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .form-group {
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .form-input,
    .form-select {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      font-family: 'Cairo', sans-serif;
    }
    
    .form-input:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
    }
    
    .ingredients-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }
    
    .ingredient-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    
    .ingredient-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(249, 115, 22, 0.2);
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }
    
    .ingredient-btn:hover::before {
      width: 200px;
      height: 200px;
    }
    
    .ingredient-btn:hover {
      transform: translateY(-4px);
      border-color: var(--primary);
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
    }
    
    .ingredient-btn.selected {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.3), rgba(234, 88, 12, 0.2));
      border-color: var(--primary);
      transform: scale(1.05);
    }
    
    .ingredient-emoji {
      font-size: 36px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    
    .ingredient-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      position: relative;
      z-index: 1;
    }
    
    .method-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    
    .method-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .method-btn:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      background: rgba(249, 115, 22, 0.1);
    }
    
    .method-btn.selected {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.3), rgba(234, 88, 12, 0.2));
      border-color: var(--primary);
    }
    
    .method-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    
    .method-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    
    .btn-generate {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 16px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(249, 115, 22, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    
    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(249, 115, 22, 0.5);
    }
    
    .btn-generate:active {
      transform: scale(0.98);
    }
    
    .recipe-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      animation: slideUp 0.5s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .recipe-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.03), transparent);
      animation: cardPulse 3s infinite;
    }
    
    .recipe-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--card-border);
      position: relative;
      z-index: 1;
    }
    
    .recipe-emoji {
      font-size: 64px;
      animation: rotate 4s ease-in-out infinite;
    }
    
    @keyframes rotate {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }
    
    .recipe-title-section {
      flex: 1;
    }
    
    .recipe-title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .recipe-subtitle {
      font-size: 16px;
      color: var(--text-muted);
    }
    
    .recipe-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    
    .info-box {
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.1), rgba(139, 92, 246, 0.05));
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }
    
    .info-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .info-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .info-value {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    
    .recipe-section {
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }
    
    .recipe-section-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }
    
    .recipe-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .recipe-list li {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
      border-left: 4px solid var(--primary);
    }
    
    .recipe-list li:hover {
      transform: translateX(-4px);
      background: rgba(255, 255, 255, 0.08);
    }
    
    .step-number {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      font-weight: 800;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .step-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
    }
    
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      position: relative;
      z-index: 1;
    }
    
    .nutrition-item {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.05));
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    
    .nutrition-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 4px;
    }
    
    .nutrition-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .btn-save {
      background: linear-gradient(135deg, var(--success), #059669);
      border: none;
      border-radius: 16px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
    }
    
    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(16, 185, 129, 0.5);
    }
    
    .btn-new {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-new:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
    
    .saved-recipes {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 24px;
      animation: fadeIn 0.5s ease-out;
    }
    
    .saved-recipes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    
    .saved-recipe-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .saved-recipe-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.2);
      border-color: var(--primary);
    }
    
    .saved-recipe-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    
    .saved-recipe-emoji {
      font-size: 32px;
    }
    
    .saved-recipe-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    
    .saved-recipe-method {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    .feedback-toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: linear-gradient(135deg, var(--success), #059669);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s ease;
    }
    
    .feedback-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 12px;
      }
      
      .header {
        padding: 16px;
      }
      
      .logo {
        font-size: 20px;
      }
      
      .ingredients-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
      
      .method-grid {
        grid-template-columns: 1fr;
      }
      
      .recipe-card {
        padding: 20px;
      }
      
      .recipe-emoji {
        font-size: 48px;
      }
      
      .recipe-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  
    <a href="../games.html" class="back-button">العودة إلى قائمة الألعاب</a>
    <div class="header">
      <div class="header-content">
        <div class="logo">
          <span>👨‍🍳</span>
          <span>الطبخ الصحي الذكي</span>
        </div>
        <div class="stats-container">
          <div class="stat-box">
            <div class="stat-label">وصفات محفوظة</div>
            <div class="stat-value" id="savedCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">وصفات اليوم</div>
            <div class="stat-value" id="todayCount">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-grid" id="mainSection">
      <div class="section-card">
        <div class="section-title">
          <span class="section-icon">🥘</span>
          <span>اختر المكونات</span>
        </div>
        
        <div class="ingredients-grid" id="ingredientsGrid"></div>
      </div>

      <div class="section-card">
        <div class="section-title">
          <span class="section-icon">🔥</span>
          <span>اختر طريقة الطهي</span>
        </div>
        
        <div class="method-grid" id="methodsGrid"></div>
        
        <button class="btn-generate" id="generateBtn">
          <span>✨</span>
          <span>اقترح وصفة صحية</span>
        </button>
      </div>
    </div>

    <div id="recipeContainer"></div>
    
    <div class="saved-recipes" id="savedSection" style="display: none;">
      <div class="section-title">
        <span class="section-icon">📚</span>
        <span>وصفاتي المحفوظة</span>
      </div>
      <div class="saved-recipes-grid" id="savedRecipesGrid"></div>
    </div>
  </div>

  <div class="feedback-toast" id="feedbackToast"></div>

  <script>
    const INGREDIENTS = [
      {name: 'صدور دجاج', emoji: '🐔', protein: 30, calories: 165},

      {name: 'لحم بقري', emoji: '🥩', protein: 26, calories: 250},

      {name: 'أرز بني', emoji: '🍚', protein: 5, calories: 216},
      {name: 'كينوا', emoji: '🌾', protein: 8, calories: 222},

    const METHODS = [
      {

        tips: 'تتبيل خفيف بزيت الزيتون والأعشاب الطبيعية، شوي على حرارة متوسطة حتى ينضج تماماً مع الاحتفاظ بالعصارة الداخلية',
        time: '15-20 دقيقة',
        difficulty: 'سهل'
      },
      {
        name: 'فرن',
        emoji: '🔲',
        tips: 'توزيع المكونات على ورق خبز، إضافة التوابل الصحية، الطهي على 180 درجة مئوية مع التقليب في منتصف المدة',
        time: '25-35 دقيقة',
        difficulty: 'سهل'
      },
      {
        name: 'سلق',
        emoji: '💧',
        tips: 'استخدام ماء مغلي مع إضافة أعشاب طبيعية (زنجبيل، كركم، ورق غار) وقليل من الملح، السلق حتى النضج الكامل',
        time: '20-30 دقيقة',
        difficulty: 'سهل جداً'
      },
      {
        name: 'قلي خفيف',
        emoji: '🍳',
        tips: 'استخدام مقلاة غير لاصقة مع رذاذ خفيف من زيت الزيتون، التقليب المستمر على نار متوسطة للحصول على قوام ذهبي',
        time: '10-15 دقيقة',
        difficulty: 'متوسط'
      }
    ];

    let selectedIngredient = null;
    let selectedMethod = null;
    let savedRecipes = [];
    let todayRecipesCount = 0;

    function loadSavedData() {
      const saved = localStorage.getItem('healthyRecipes');
      if (saved) {
        savedRecipes = JSON.parse(saved);
      }
      
      const today = new Date().toDateString();
      const lastDate = localStorage.getItem('lastRecipeDate');
      if (lastDate === today) {
        todayRecipesCount = parseInt(localStorage.getItem('todayRecipesCount')) || 0;
      } else {
        todayRecipesCount = 0;
        localStorage.setItem('lastRecipeDate', today);
        localStorage.setItem('todayRecipesCount', '0');
      }
    }

    function saveSavedRecipes() {
      localStorage.setItem('healthyRecipes', JSON.stringify(savedRecipes));
    }

    function renderIngredients() {
      const grid = document.getElementById('ingredientsGrid');
      grid.innerHTML = INGREDIENTS.map((ing, index) => `
        <div class="ingredient-btn ${selectedIngredient === index ? 'selected' : ''}" 
             onclick="selectIngredient(${index})">
          <div class="ingredient-emoji">${ing.emoji}</div>
          <div class="ingredient-name">${ing.name}</div>
        </div>
      `).join('');
    }

    function renderMethods() {
      const grid = document.getElementById('methodsGrid');
      grid.innerHTML = METHODS.map((method, index) => `
        <div class="method-btn ${selectedMethod === index ? 'selected' : ''}" 
             onclick="selectMethod(${index})">
          <div class="method-icon">${method.emoji}</div>
          <div class="method-name">${method.name}</div>
        </div>
      `).join('');
    }

    function selectIngredient(index) {
      selectedIngredient = index;
      renderIngredients();
    }

    function selectMethod(index) {
      selectedMethod = index;
      renderMethods();
    }

    function generateRecipe() {
      if (selectedIngredient === null) {
        showFeedback('⚠️ الرجاء اختيار المكون الأساسي');
        return;
      }
      
      if (selectedMethod === null) {
        showFeedback('⚠️ الرجاء اختيار طريقة الطهي');
        return;
      }

      const ingredient = INGREDIENTS[selectedIngredient];
      const method = METHODS[selectedMethod];
      
      // Create recipe
      const recipe = {
        id: Date.now(),
        ingredient: ingredient,
        method: method,
        createdAt: new Date().toISOString()
      };

      // Update today count
      todayRecipesCount++;
      localStorage.setItem('todayRecipesCount', todayRecipesCount.toString());
      updateStats();

      renderRecipe(recipe);
      
      // Scroll to recipe
      setTimeout(() => {
        document.getElementById('recipeContainer').scrollIntoView({ 
          behavior: 'smooth', 
          block: 'start' 
        });
      }, 100);
    }

    function renderRecipe(recipe) {
      const container = document.getElementById('recipeContainer');
      const ing = recipe.ingredient;
      const method = recipe.method;
      
      // Generate complementary ingredients
      const complements = getComplementaryFoods(ing.name);
      
      // Calculate nutrition
      const totalCalories = ing.calories + 150; // Adding estimated calories from sides
      const totalProtein = ing.protein + 5;
      
      container.innerHTML = `
        <div class="recipe-card">
          <div class="recipe-header">
            <div class="recipe-emoji">${ing.emoji}</div>
            <div class="recipe-title-section">
              <div class="recipe-title">${ing.name} بطريقة ${method.name}</div>
              <div class="recipe-subtitle">وصفة صحية ومتوازنة</div>
            </div>
          </div>

          <div class="recipe-info-grid">
            <div class="info-box">
              <div class="info-icon">⏱️</div>
              <div class="info-label">وقت التحضير</div>
              <div class="info-value">${method.time}</div>
            </div>
            <div class="info-box">
              <div class="info-icon">📊</div>
              <div class="info-label">مستوى الصعوبة</div>
              <div class="info-value">${method.difficulty}</div>
            </div>
            <div class="info-box">
              <div class="info-icon">🍽️</div>
              <div class="info-label">عدد الحصص</div>
              <div class="info-value">2-3</div>
            </div>
          </div>

          <div class="recipe-section">
            <div class="recipe-section-title">
              <span>📝</span>
              <span>المكونات</span>
            </div>
            <ul class="recipe-list">
              <li>
                <span class="step-number">1</span>
                <span class="step-text">${ing.name} طازج (300-400 جرام)</span>
              </li>
              <li>
                <span class="step-number">2</span>
                <span class="step-text">زيت زيتون بكر ممتاز (ملعقة كبيرة)</span>
              </li>
              <li>
                <span class="step-number">3</span>
                <span class="step-text">أعشاب طبيعية (ريحان، زعتر، إكليل الجبل)</span>
              </li>
              <li>
                <span class="step-number">4</span>
                <span class="step-text">ليمون طازج + ملح وفلفل أسود</span>
              </li>
              <li>
                <span class="step-number">5</span>
                <span class="step-text">خضروات متنوعة للتقديم</span>
              </li>
            </ul>
          </div>

          <div class="recipe-section">
            <div class="recipe-section-title">
              <span>👨‍🍳</span>
              <span>خطوات التحضير</span>
            </div>
            <ul class="recipe-list">
              <li>
                <span class="step-number">1</span>
                <span class="step-text">اغسل ${ing.name} جيداً بالماء البارد وجففه بمنشفة ورقية نظيفة.</span>
              </li>
              <li>
                <span class="step-number">2</span>
                <span class="step-text">تبّل ${ing.name} بزيت الزيتون والأعشاب الطبيعية وعصير الليمون مع قليل من الملح والفلفل.</span>
              </li>
              <li>
                <span class="step-number">3</span>
                <span class="step-text">${method.tips}</span>
              </li>
              <li>
                <span class="step-number">4</span>
                <span class="step-text">حضّر طبق من ${complements} كمرافق صحي ومتوازن.</span>
              </li>
              <li>
                <span class="step-number">5</span>
                <span class="step-text">قدّم الطبق ساخناً مع رش القليل من الليمون والأعشاب الطازجة للتزيين.</span>
              </li>
            </ul>
          </div>

          <div class="recipe-section">
            <div class="recipe-section-title">
              <span>💚</span>
              <span>القيم الغذائية التقريبية (لكل حصة)</span>
            </div>
            <div class="nutrition-grid">
              <div class="nutrition-item">
                <div class="nutrition-value">${totalCalories}</div>
                <div class="nutrition-label">سعرة حرارية</div>
              </div>
              <div class="nutrition-item">
                <div class="nutrition-value">${totalProtein}g</div>
                <div class="nutrition-label">بروتين</div>
              </div>
              <div class="nutrition-item">
                <div class="nutrition-value">15g</div>
                <div class="nutrition-label">دهون صحية</div>
              </div>
              <div class="nutrition-item">
                <div class="nutrition-value">25g</div>
                <div class="nutrition-label">كربوهيدرات</div>
              </div>
              <div class="nutrition-item">
                <div class="nutrition-value">8g</div>
                <div class="nutrition-label">ألياف</div>
              </div>
            </div>
          </div>

          <div style="text-align: center; margin-top: 24px; position: relative; z-index: 1;">
            <button class="btn-save" onclick="saveRecipe(${JSON.stringify(recipe).replace(/"/g, '&quot;')})">
              <span>💾</span>
              <span>حفظ الوصفة</span>
            </button>
            <button class="btn-new" onclick="newRecipe()">
              <span>➕</span>
              <span>وصفة جديدة</span>
            </button>
          </div>
        </div>
      `;
    }

    function getComplementaryFoods(ingredientName) {
      const complements = {
        'صدور دجاج': 'سلطة خضراء كبيرة وأرز بني أو كينوا',
        'سمك السلمون': 'خضار مشوية متنوعة وبطاطا حلوة',
        'لحم بقري': 'سلطة ملونة وخبز كامل الحبوب',
        'بيض': 'خضار سوتيه وخبز أسمر محمص',
        'عدس': 'أرز بني وسلطة يونانية',
        'حمص': 'خضار مشكلة وخبز بلدي',
        'بروكلي': 'كينوا وصدور دجاج مشوية',
        'سبانخ': 'معكرونة كاملة وجبن قليل الدسم',
        'بطاطا حلوة': 'سلطة خضراء ومصدر بروتين',
        'أرز بني': 'خضار مشكلة ومصدر بروتين',
        'كينوا': 'خضار ملونة ومكسرات',
        'أفوكادو': 'سلطة متنوعة وخبز محمص'
      };
      
      return complements[ingredientName] || 'سلطة خضراء متنوعة وحبوب كاملة';
    }

    function saveRecipe(recipe) {
      // Check if already saved
      const exists = savedRecipes.some(r => 
        r.ingredient.name === recipe.ingredient.name && 
        r.method.name === recipe.method.name
      );
      
      if (exists) {
        showFeedback('⚠️ هذه الوصفة محفوظة بالفعل');
        return;
      }
      
      savedRecipes.push(recipe);
      saveSavedRecipes();
      updateStats();
      renderSavedRecipes();
      showFeedback('✅ تم حفظ الوصفة بنجاح!');
    }

    function renderSavedRecipes() {
      const section = document.getElementById('savedSection');
      const grid = document.getElementById('savedRecipesGrid');
      
      if (savedRecipes.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      grid.innerHTML = savedRecipes.map((recipe, index) => `
        <div class="saved-recipe-card" onclick="loadSavedRecipe(${index})">
          <div class="saved-recipe-header">
            <div class="saved-recipe-emoji">${recipe.ingredient.emoji}</div>
            <div>
              <div class="saved-recipe-name">${recipe.ingredient.name}</div>
              <div class="saved-recipe-method">${recipe.method.emoji} ${recipe.method.name}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function loadSavedRecipe(index) {
      const recipe = savedRecipes[index];
      renderRecipe(recipe);
      
      // Scroll to recipe
      setTimeout(() => {
        document.getElementById('recipeContainer').scrollIntoView({ 
          behavior: 'smooth', 
          block: 'start' 
        });
      }, 100);
    }

    function newRecipe() {
      selectedIngredient = null;
      selectedMethod = null;
      renderIngredients();
      renderMethods();
      document.getElementById('recipeContainer').innerHTML = '';
      
      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateStats() {
      document.getElementById('savedCount').textContent = savedRecipes.length;
      document.getElementById('todayCount').textContent = todayRecipesCount;
    }

    function showFeedback(message) {
      const toast = document.getElementById('feedbackToast');
      toast.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // Event listeners
    document.getElementById('generateBtn').addEventListener('click', generateRecipe);

    // Initialize
    loadSavedData();
    renderIngredients();
    renderMethods();
    renderSavedRecipes();
    updateStats();
  </script>
</body>
</html>
