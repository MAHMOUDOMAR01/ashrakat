<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚠️ الصفحة غير موجودة (404)</title>
  <link rel="stylesheet" href="assets/css/navbar.css" />
  <style>
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0;
      color: #2c3e50;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 110px 20px 40px; /* مساحة لشريط التنقل الثابت */
      text-align: center;
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      color: #764ba2;
      margin: 10px 0;
    }
    .title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .desc {
      color: #6c757d;
      margin-bottom: 20px;
    }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      background: #4CAF50;
      color: #fff;
    }
    .btn.secondary { background: #2196F3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <div class="title">الصفحة غير موجودة</div>
    <p class="desc">يبدو أنك وصلت إلى رابط غير صحيح أو قد تم نقل الصفحة.</p>
    <div class="actions">
      <a class="btn" href="index.html">العودة للصفحة الرئيسية</a>
      <a class="btn secondary" href="pages/main/sitemap.html">خريطة الموقع</a>
    </div>
  </div>

  <!-- شريط التنقل -->
  <script src="assets/js/navbar.js"></script>
</body>
</html>
